            display.style.display = 'block';

            return false;

        // Lucide 图标集 UMD 模式兼容处理
        const LucideIcon = ({ name, ...props }) => {
            const [IconComponent, setIconComponent] = React.useState(null);

            React.useEffect(() => {
                if (window.lucide) {
                    // 获取图标名称对应的类名 (PascalCase)
                    const iconName = name.charAt(0).toUpperCase() + name.slice(1);
                    // 动态创建图标
                    const icon = window.lucide.icons[iconName];
                    if (icon) {
                        // 在 UMD 模式下，我们手动将图标转换为 React 可用的 svg 字符串渲染
                        // 或者更简单的方法是使用 lucide.createIcons
                        setIconComponent(icon);
                    }
                }
            }, [name]);

            if (!IconComponent) return <span style={{display:'inline-block', width:'1em', height:'1em'}}></span>;
            
            // 简单模拟 Lucide React 组件
            return (
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width={props.size || props.width || 24}
                    height={props.size || props.height || 24}
                    viewBox="0 0 24 24"
                    fill={props.fill || "none"}
                    stroke="currentColor"
                    strokeWidth={props.strokeWidth || 2}
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={props.className}
                    dangerouslySetInnerHTML={{ __html: IconComponent[2].map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tagName} ${attrStr} />`;
                    }).join('') }}
                />
            );
        };

                    没钱也能 <span className="text-orange-600 relative inline-block">放肆玩！<svg className="absolute -bottom-2 left-0 w-full" viewBox="0 0 100 10" preserveAspectRatio="none"><path d="M0 5 Q 25 0 50 5 T 100 5" fill="none" stroke="#fb923c" strokeWidth="4" /></svg></span>
                  </h2>
                  <p className="text-xl text-gray-500 max-w-2xl mx-auto mb-12 font-medium">告别昂贵的订票流程，我们只为你寻找那些隐藏在角落的旅行惊喜。</p>
                  <div className="max-w-4xl mx-auto bg-white/40 backdrop-blur-2xl border border-white/60 p-3 rounded-[3rem] shadow-2xl flex flex-col md:flex-row items-center gap-3">
                    <div className="flex-1 w-full flex items-center gap-4 bg-white/60 rounded-[2.5rem] px-8 py-4 border border-white/80">
                      <Search className="w-6 h-6 text-orange-400" />
                      <input type="text" placeholder="你想去哪里？(如：重庆)" className="w-full bg-transparent outline-none text-lg font-medium placeholder:text-gray-400" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                    </div>
                    <div className="hidden md:flex items-center gap-4 bg-white/60 rounded-[2.5rem] px-8 py-4 border border-white/80">
                      <Calendar className="w-6 h-6 text-orange-400" /><span className="text-lg font-medium text-gray-600 whitespace-nowrap">未来 14 天</span>
                    </div>
                    <button onClick={handleSearch} className="w-full md:w-auto bg-gray-900 hover:bg-black text-white px-10 py-5 rounded-[2.5rem] font-bold text-lg shadow-xl shadow-gray-200 transition-all active:scale-95 flex items-center justify-center gap-3">搜索灵感</button>
                  </div>
                </div>
              </section>

              <main className="max-w-7xl mx-auto px-6 pb-40">
                <div className="flex flex-col lg:flex-row gap-12">
                  <div className="flex-1">
                    <div className="flex items-center gap-4 mb-10 overflow-x-auto pb-2">
                      <button onClick={() => setActiveTab('cheap')} className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-bold transition-all whitespace-nowrap ${activeTab === 'cheap' ? 'bg-orange-500 text-white shadow-lg shadow-orange-200' : 'bg-white/40 backdrop-blur-md text-gray-600 border border-white/60 hover:bg-white/60'}`}><Sparkles className="w-5 h-5" />极致省钱 (含中转)</button>
                      <button onClick={() => setActiveTab('direct')} className={`flex items-center gap-2 px-8 py-4 rounded-2xl font-bold transition-all whitespace-nowrap ${activeTab === 'direct' ? 'bg-orange-500 text-white shadow-lg shadow-orange-200' : 'bg-white/40 backdrop-blur-md text-gray-600 border border-white/60 hover:bg-white/60'}`}><Plane className="w-5 h-5" />直飞省时</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      {filteredFlights.length > 0 ? filteredFlights.map(flight => <FlightCard key={flight.id} flight={flight} onClick={setSelectedFlight} />) : <div className="col-span-full py-20 text-center bg-white/20 backdrop-blur-md rounded-[3rem] border border-dashed border-gray-300"><div className="p-6 bg-white/40 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6"><MonitorPlay className="w-10 h-10 text-gray-400" /></div><h3 className="text-2xl font-bold text-gray-500">暂时没有找到符合条件的特价机票</h3><p className="text-gray-400 mt-2">试试搜索其他城市，或者切换分类标签吧！</p></div>}
                    </div>
                  </div>
                  <aside className="lg:w-[400px]">
                    <PriceMonitor />
                    <div className="mt-8 p-8 bg-gradient-to-br from-gray-900 to-gray-800 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden group">
                      <div className="absolute -top-10 -right-10 w-40 h-40 bg-orange-500/20 rounded-full blur-3xl transition-transform group-hover:scale-150 duration-700" />
                      <div className="relative z-10">
                        <h5 className="text-xl font-bold mb-3 flex items-center gap-2"><Heart className="w-5 h-5 text-orange-500 fill-orange-500" />学生专属优惠</h5>
                        <p className="text-sm text-gray-300 leading-relaxed mb-6">认证学生身份，部分航线最高可再减 <span className="text-orange-400 font-bold">¥50</span>，支持分期付款。</p>
                        <button className="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl font-bold text-sm transition-all">立即认证</button>
                      </div>
                    </div>
                  </aside>
                </div>
              </main>

              <BookingModal flight={selectedFlight} onClose={() => setSelectedFlight(null)} />

              <footer className="bg-white/30 backdrop-blur-xl border-t border-white/40 py-12">
                <div className="max-w-7xl mx-auto px-6 text-center">
                  <div className="flex items-center justify-center gap-3 mb-6"><Palmtree className="text-orange-500 w-8 h-8" /><h1 className="text-3xl font-black tracking-tight text-gray-900">随心飞</h1></div>
                  <p className="text-gray-500 text-sm mb-8">© 2024 Suixinfei - 发现低价旅行灵感的极致选择</p>
                </div>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SuixinfeiApp />);
    </script>
</body>
</html>
